{% extends 'base.html' %}

{% block content %}

  <form action="{{ url_for('create_user') }}" method="POST" class="search-form">
    <input type="text" name="name" placeholder="Username">
    <button type="submit" class="btn-primary">Add user</button>
  </form>
  <h2>Users</h2>
  <div class="user-grid">
  {% for user in users %}
    <div class="user-card">
      <a href="/users/{{ user.id }}/movies">{{ user.name }}</a>
    </div>
  {% endfor %}
  </div>
{% endblock %}
