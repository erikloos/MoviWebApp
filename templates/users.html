{% extends 'base.html' %}

{% block content %}
  <h2>Users</h2>

  <form action="/users" method="POST">
    <input type="text" name="name" placeholder="Username">
    <button type="submit">Add user</button>
  </form>

  <ul>
  {% for user in users %}
    <li>
      <a href="/users/{{ user.id }}/movies">{{ user.name }}</a>
    </li>
  {% endfor %}
  </ul>
{% endblock %}
